<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PineVault Store</title><link href='https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&display=swap' rel='stylesheet'><style>*{box-sizing:border-box}body{margin:0;background:#080a0f;color:#f0f2f8;font-family:Syne,Arial,sans-serif}nav{position:sticky;top:0;background:#0b0e15ee;border-bottom:1px solid #ffffff18;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:5}.logo{font-weight:800;font-size:20px}.tabs button,.wa{border:1px solid #ffffff22;background:#161b26;color:#c8cede;border-radius:10px;padding:8px 12px;font-weight:700;text-decoration:none;cursor:pointer}.tabs button.active{color:#00e5b4;border-color:#00e5b466}.hero{text-align:center;padding:70px 20px 45px}.hero small{color:#00e5b4;border:1px solid #00e5b444;border-radius:99px;padding:6px 12px;font-weight:800}.hero h1{font-size:clamp(38px,7vw,70px);line-height:.95;margin:22px 0 14px;letter-spacing:-3px}.hero span{background:linear-gradient(135deg,#00e5b4,#6c5ce7);-webkit-background-clip:text;color:transparent}.hero p{color:#8892a4;max-width:560px;margin:auto;line-height:1.7}.wrap{max-width:1200px;margin:auto;padding:0 18px 60px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}.card{background:#0f1117;border:1px solid #ffffff16;border-radius:20px;overflow:hidden;cursor:pointer}.card:hover{border-color:#00e5b455;transform:translateY(-2px)}.thumb{height:170px;background:#161b26;display:flex;align-items:center;justify-content:center;font-size:42px}.thumb img{width:100%;height:100%;object-fit:cover}.body{padding:15px}.tag{display:inline-block;font-size:12px;font-weight:800;border-radius:99px;padding:4px 9px;margin-bottom:10px}.vip{color:#f59e0b;background:#f59e0b18;border:1px solid #f59e0b44}.free{color:#00e5b4;background:#00e5b418;border:1px solid #00e5b444}.title{font-weight:800;margin-bottom:8px}.cap{color:#8892a4;font-size:14px;line-height:1.55;min-height:44px}.foot{border-top:1px solid #ffffff12;margin-top:14px;padding-top:12px;display:flex;justify-content:space-between;align-items:center}.price{color:#f59e0b;font-weight:800}.buy{background:#f59e0b;color:#050505;border:0;border-radius:10px;padding:8px 12px;font-weight:800;cursor:pointer}.empty{text-align:center;color:#8892a4;padding:50px}.modalBg{display:none;position:fixed;inset:0;background:#000c;z-index:20;align-items:center;justify-content:center;padding:16px}.modalBg.open{display:flex}.modal{background:#0f1117;border:1px solid #ffffff22;border-radius:20px;width:min(540px,100%);padding:22px;position:relative}.x{position:absolute;right:12px;top:12px;background:#161b26;color:white;border:1px solid #ffffff22;border-radius:8px;width:32px;height:32px}.modal img{width:100%;height:230px;object-fit:cover;border-radius:14px}.upi{background:#f59e0b12;border:1px solid #f59e0b33;border-radius:14px;padding:14px;text-align:center;margin:14px 0}.upi b{color:#f59e0b}label{display:block;color:#8892a4;font-size:12px;font-weight:800;margin:12px 0 6px}input{width:100%;background:#161b26;border:1px solid #ffffff18;color:white;border-radius:10px;padding:11px}.toast{position:fixed;bottom:18px;right:18px;background:#161b26;border:1px solid #ffffff22;border-left:4px solid #00e5b4;border-radius:12px;padding:12px 14px;display:none}@media(max-width:640px){.tabs{display:none}.hero{padding-top:45px}.grid{grid-template-columns:1fr}}</style></head><body><nav><div class='logo'>📈 PineVault</div><div class='tabs'><button class='active' onclick='show("all",this)'>All</button><button onclick='show("vip",this)'>VIP</button><button onclick='show("free",this)'>Free</button></div><a id='waTop' class='wa' target='_blank'>WhatsApp</a></nav><section class='hero'><small>TRADINGVIEW + PYTHON CODE</small><h1>Pro Algo<br><span>Code Store</span></h1><p>Listings are controlled from your admin page using free GitHub storage. Buyers send details to WhatsApp.</p></section><main class='wrap'><div class='head'><h2>Available Listings <span id='count'></span></h2></div><div id='grid' class='grid'><div class='empty'>Loading...</div></div></main><div id='detail' class='modalBg'><div class='modal'><button class='x' onclick='closeM()'>×</button><div id='detailBody'></div></div></div><div id='buy' class='modalBg'><div class='modal'><button class='x' onclick='closeBuy()'>×</button><h2>Purchase Request</h2><p id='buySub' style='color:#8892a4'></p><label>Your Name</label><input id='name'><label>Phone Number</label><input id='phone'><label>Transaction ID / UTR</label><input id='txn'><p style='color:#8892a4;font-size:13px;line-height:1.6'>After WhatsApp opens, attach your payment screenshot manually.</p><button class='buy' style='width:100%;padding:12px' onclick='sendWA()'>Open WhatsApp</button></div></div><div id='toast' class='toast'></div><script>let data={whatsapp:'918135975559',defaultUpi:'yourupi@upi',strategies:[]},items=[],filter='all',cur=null;function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}async function load(){try{let r=await fetch('data.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error('data.json not found');data=await r.json();items=data.strategies||[];document.getElementById('waTop').href='https://wa.me/'+(data.whatsapp||'918135975559');render()}catch(e){document.getElementById('grid').innerHTML='<div class=empty>Could not load data.json<br>'+esc(e.message)+'</div>'}}function show(f,b){filter=f;document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){let arr=filter==='all'?items:items.filter(x=>x.type===filter);document.getElementById('count').textContent='('+arr.length+')';let g=document.getElementById('grid');if(!arr.length){g.innerHTML='<div class=empty>No listings yet</div>';return}g.innerHTML=arr.map(s=>`<div class=card onclick='openD("${s.id}")'><div class=thumb>${s.image?`<img src='${esc(s.image)}'>`:'📈'}</div><div class=body><span class='tag ${s.type==='vip'?'vip':'free'}'>${s.type==='vip'?'VIP':'FREE'}</span><div class=title>${esc(s.name)}</div><div class=cap>${esc(s.caption)}</div><div class=foot><span class=price>₹${esc(s.price||'Free')}</span><button class=buy onclick='openB(event,"${s.id}")'>Buy</button></div></div></div>`).join('')}function openD(id){let s=items.find(x=>x.id===id);if(!s)return;cur=s;document.getElementById('detailBody').innerHTML=`${s.image?`<img src='${esc(s.image)}'>`:''}<h2>${esc(s.name)}</h2><p style='color:#8892a4;line-height:1.6'>${esc(s.caption)}</p><h1 style='color:#f59e0b'>₹${esc(s.price||'Free')}</h1><div class=upi>Pay UPI: <b>${esc(s.upi||data.defaultUpi)}</b></div><button class=buy style='width:100%;padding:12px' onclick='openB(event,"${s.id}")'>Buy on WhatsApp</button>`;document.getElementById('detail').classList.add('open')}function closeM(){document.getElementById('detail').classList.remove('open')}function openB(e,id){if(e)e.stopPropagation();cur=items.find(x=>x.id===id);document.getElementById('buySub').textContent=cur.name+' — ₹'+(cur.price||'Free');['name','phone','txn'].forEach(i=>document.getElementById(i).value='');document.getElementById('buy').classList.add('open');closeM()}function closeBuy(){document.getElementById('buy').classList.remove('open')}function sendWA(){let n=name.value.trim(),p=phone.value.trim(),t=txn.value.trim();if(!n||!p||!t)return toast('Fill all details');let msg=`Hello Pankaj, I want to buy this code.%0A%0AName: ${encodeURIComponent(n)}%0APhone: ${encodeURIComponent(p)}%0ACode: ${encodeURIComponent(cur.name)}%0APrice: ₹${encodeURIComponent(cur.price||'Free')}%0ATransaction ID: ${encodeURIComponent(t)}%0A%0AI will attach payment screenshot here.`;window.open('https://wa.me/'+(data.whatsapp||'918135975559')+'?text='+msg,'_blank')}function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2500)}load();</script></body></html>
